<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
<meta property="og:title" content="Surprise!">
    <meta property="og:description" content="A little something for you.">
    <meta property="og:image" content="https://kariii12.github.io/hello/tom.jpg">
    <meta property="og:url" content="https://kariii12.github.io/hello/">
    <meta property="og:type" content="website">
    <style>
        /* This keeps everything perfectly centered in the middle of the screen */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #163A45;
            color: #F2FAF7;
            font-family: sans-serif;
            text-align: center;
        }

        /* Adds a little space between the GIF and the text */
        img {
            margin-bottom: 20px;
        }
        h2 {
        font-size: 12px; /* Change this number to make it smaller or larger */
        font-weight: bold; /* Optional: makes it look less bulky */
    }
    </style>
</head>
<body>

    <!-- Your GIF, resized to 150px wide -->
    <img src="loading.gif" alt="Wrapping gift" width="150">

    <!-- The messages will appear here -->
    <h2 id="status-text">Preparing a little surprise...</h2>

    <script>
        const messages = [
            "Preparing a little surprise...", // 0s - 3s
            "Wrapping it up...",             // 3s - 6s
            "Adding a golden bow...",        // 6s - 9s
            "Checking the final touches...", // 9s - 12s
            "Ta-da! Here we go!"             // 12s - 20s (Shows for 8 seconds)
        ];

        let index = 0;
        const textElement = document.getElementById("status-text");

        // Change text every 3000 milliseconds (3 seconds)
        const interval = setInterval(() => {
            index++;
            if (index < messages.length) {
                textElement.innerText = messages[index];
            }
        }, 3000);

        // Redirect after 20 seconds (20000 milliseconds)
        setTimeout(() => {
            clearInterval(interval);
            window.location.href = "quiz.html";
        }, 20000); 
    </script>
</body>
</html>
